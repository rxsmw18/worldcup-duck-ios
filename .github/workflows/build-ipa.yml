name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ipa:
    name: Build unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -s /Applications/Xcode.app
          else
            xcode-select -p
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fetch bundled background videos
        run: |
          set -euo pipefail
          curl -fsSL https://duck.gobet365.win/assets/fifa26-hero.mp4 -o WorldCupDuck/fifa26-hero.mp4
          curl -fsSL https://duck.gobet365.win/assets/fifa26-analysis.mp4 -o WorldCupDuck/fifa26-analysis.mp4
          ls -lh WorldCupDuck/*.mp4

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app without signing
        run: |
          set -euo pipefail
          xcodebuild \
            -project WorldCupDuck.xcodeproj \
            -scheme WorldCupDuck \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)"
          IPA_NAME="WorldCupDuck.ipa"
          test -d "$APP_PATH"
          rm -rf Payload "$IPA_NAME"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry "$IPA_NAME" Payload
          ls -lh "$IPA_NAME"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorldCupDuck-unsigned-ipa
          path: WorldCupDuck.ipa
          if-no-files-found: error
