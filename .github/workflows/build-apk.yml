name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Fetch bundled background videos
        run: |
          set -euo pipefail
          mkdir -p app/src/main/assets
          curl -fsSL https://duck.gobet365.win/assets/fifa26-hero.mp4 -o app/src/main/assets/fifa26-hero.mp4
          curl -fsSL https://duck.gobet365.win/assets/fifa26-analysis.mp4 -o app/src/main/assets/fifa26-analysis.mp4
          ls -lh app/src/main/assets/*.mp4

      - name: Install SDK packages
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk WorldCupDuck.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorldCupDuck-apk
          path: android/WorldCupDuck.apk
          if-no-files-found: error
